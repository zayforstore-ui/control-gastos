<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#111827">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Control de Gastos</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
    }
  </script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col">
  <header class="bg-gray-900/95 backdrop-blur-sm border-b border-gray-800 px-5 py-3 flex-shrink-0 sticky top-0 z-10">
    <div class="flex items-center justify-between">
      <h1 class="text-lg font-bold">💰 Control de Gastos</h1>
      <button id="btn-export" class="text-xs text-gray-500 hover:text-gray-300 transition-colors px-2 py-1 rounded-lg hover:bg-gray-800" title="Exportar datos">📤</button>
    </div>
  </header>

  <main class="flex-1 overflow-y-auto px-4 pt-4 pb-2 scroll-smooth">
    <section id="balance-tab" class="tab-content active"></section>
    <section id="form-tab" class="tab-content">
      <form id="transaction-form" class="space-y-4" autocomplete="off">
        <input type="hidden" name="type" value="expense">

        <div class="bg-gray-800 rounded-2xl p-1.5 flex">
          <button type="button" class="toggle-btn flex-1 py-3 text-center font-medium rounded-xl transition-all duration-200 text-sm" data-type="expense">
            💸 Gasto
          </button>
          <button type="button" class="toggle-btn flex-1 py-3 text-center font-medium rounded-xl transition-all duration-200 text-sm" data-type="income">
            💰 Ingreso
          </button>
        </div>

        <div>
          <label class="block text-sm text-gray-400 mb-1.5 font-medium">Monto</label>
          <div class="relative">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 font-medium text-lg">$</span>
            <input type="number" id="amount" class="input-field pl-8" placeholder="0.00" step="0.01" min="0" inputmode="decimal">
          </div>
        </div>

        <div>
          <label class="block text-sm text-gray-400 mb-1.5 font-medium">Descripción</label>
          <input type="text" id="description" class="input-field" placeholder="¿En qué gastaste o recibiste?" maxlength="100">
        </div>

        <div>
          <label class="block text-sm text-gray-400 mb-1.5 font-medium">Categoría</label>
          <select id="category" class="input-field"></select>
        </div>

        <div>
          <label class="block text-sm text-gray-400 mb-1.5 font-medium">Fecha</label>
          <input type="date" id="date" class="input-field">
        </div>

        <div class="flex gap-3 pt-2">
          <button type="button" id="btn-reset" class="flex-1 py-3.5 px-4 rounded-2xl text-gray-400 bg-gray-800 hover:bg-gray-700 active:bg-gray-600 transition-all text-sm font-medium">
            Cancelar
          </button>
          <button type="submit" class="flex-1 py-3.5 px-4 rounded-2xl bg-emerald-600 hover:bg-emerald-500 active:bg-emerald-400 text-white font-semibold transition-all active:scale-[0.98] text-sm shadow-lg shadow-emerald-600/20">
            ✅ Agregar
          </button>
        </div>
      </form>
    </section>
    <section id="history-tab" class="tab-content"></section>
  </main>

  <nav class="bg-gray-800 border-t border-gray-700/50 flex-shrink-0 safe-area-bottom">
    <div class="flex">
      <button class="tab-btn active flex-1 flex flex-col items-center py-2.5 text-xs font-medium transition-colors duration-200" data-tab="balance">
        <svg class="w-6 h-6 mb-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/>
        </svg>
        Balance
      </button>
      <button class="tab-btn flex-1 flex flex-col items-center py-2.5 text-xs font-medium transition-colors duration-200" data-tab="form">
        <svg class="w-6 h-6 mb-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
        </svg>
        Registrar
      </button>
      <button class="tab-btn flex-1 flex flex-col items-center py-2.5 text-xs font-medium transition-colors duration-200" data-tab="history">
        <svg class="w-6 h-6 mb-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
        </svg>
        Historial
      </button>
    </div>
  </nav>

  <script src="js/models/Transaction.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/services/transactionService.js"></script>
  <script src="js/ui/balanceUI.js"></script>
  <script src="js/ui/formUI.js"></script>
  <script src="js/ui/historyUI.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
